name: SmartSure CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

# ─── Environment variables shared across jobs ──────────────────────────────────
env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_BASE:       ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 runtime for all actions

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Create ECR repositories (runs once, safe to re-run)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  create-ecr-repos:
    name: 🏗️ Create ECR Repositories
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 📦 Create all ECR repositories
        run: |
          REPOS=(
            "smartsure/config-server"
            "smartsure/service-registry"
            "smartsure/api-gateway"
            "smartsure/auth-service"
            "smartsure/policy-service"
            "smartsure/claim-service"
            "smartsure/admin-service"
            "smartsure/payment-service"
            "smartsure/frontend"
          )
          for repo in "${REPOS[@]}"; do
            echo "Creating repo: $repo"
            aws ecr create-repository \
              --repository-name "$repo" \
              --region ${{ secrets.AWS_REGION }} 2>/dev/null \
              && echo "  ✅ Created: $repo" \
              || echo "  ℹ️  Already exists: $repo"
          done

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Build all Spring Boot services in parallel and push to ECR
# ══════════════════════════════════════════════════════════════════════════════
  build-backend:
    name: Build & Push → ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [create-ecr-repos]
    strategy:
      fail-fast: false        # If one service fails, others keep building
      matrix:
        service:
          - name: config-server
            context: config-server-smart-sure
          - name: service-registry
            context: ServiceRegistrySmartSure
          - name: api-gateway
            context: ApiGatewaySmartSure
          - name: auth-service
            context: AuthService
          - name: policy-service
            context: PolicyService
          - name: claim-service
            context: claimService
          - name: admin-service
            context: adminService
          - name: payment-service
            context: paymentService

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Set up Docker Buildx (faster builds with cache)
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push → smartsure/${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.service.context }}
          push:       true
          tags:       ${{ env.ECR_BASE }}/smartsure/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service.name }}

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Build Angular frontend and push to ECR
# ══════════════════════════════════════════════════════════════════════════════
  build-frontend:
    name: Build & Push → frontend
    runs-on: ubuntu-latest
    needs: [create-ecr-repos]

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push → smartsure/frontend
        uses: docker/build-push-action@v5
        with:
          context:    frontend
          push:       true
          tags:       ${{ env.ECR_BASE }}/smartsure/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Deploy: SSH into EC2, pull images, restart containers
#          Runs only after ALL build jobs succeed
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]   # Wait for all builds

    steps:
      - name: ⬇️ Checkout source (for compose + prometheus files)
        uses: actions/checkout@v4

      # ── Copy deployment files to EC2 via SCP ─────────────────────────────
      - name: 📂 Copy docker-compose & prometheus to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      "deploy/docker-compose.prod.yml,deploy/prometheus.yml"
          target:      "/home/ubuntu/smartsure"
          strip_components: 1    # Remove the "deploy/" prefix on EC2

      # ── SSH into EC2: authenticate ECR, pull images, restart ─────────────
      - name: Pull images and restart containers on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
          ECR_BASE:              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          MYSQL_ROOT_PASSWORD:   ${{ secrets.MYSQL_ROOT_PASSWORD }}
          RABBITMQ_USER:         ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS:         ${{ secrets.RABBITMQ_PASS }}
          GRAFANA_PASSWORD:      ${{ secrets.GRAFANA_PASSWORD }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  15m
          envs:     AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,ECR_BASE,MYSQL_ROOT_PASSWORD,RABBITMQ_USER,RABBITMQ_PASS,GRAFANA_PASSWORD

          script: |
            set -e

            echo "=== Authenticating Docker to ECR ==="
            aws ecr get-login-password --region "$AWS_DEFAULT_REGION" \
              | docker login --username AWS --password-stdin "$ECR_BASE"

            echo "=== Moving to deployment directory ==="
            mkdir -p /home/ubuntu/smartsure
            cd /home/ubuntu/smartsure

            echo "=== Writing .env file ==="
            cat > .env << ENVEOF
ECR_BASE=${ECR_BASE}
MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
RABBITMQ_USER=${RABBITMQ_USER}
RABBITMQ_PASS=${RABBITMQ_PASS}
GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
ENVEOF

            echo "=== Pulling latest images from ECR ==="
            docker compose -f docker-compose.prod.yml --env-file .env pull

            echo "=== Restarting all services ==="
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "Deployment complete!"
            echo "Frontend -> http://$(curl -s ifconfig.me)"
            echo "Gateway  -> http://$(curl -s ifconfig.me):8080"
            echo "Eureka   -> http://$(curl -s ifconfig.me):8761"

