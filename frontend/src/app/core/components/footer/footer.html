<footer class="app-footer">
  <div class="footer-inner">

    <!-- Left: Brand + tagline -->
    <div class="footer-brand">
      <div class="footer-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" fill="rgba(255,255,255,0.2)" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 7v5l4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="footer-brand-text">
        <span class="footer-brand-name">Smart<span class="accent">Sure</span></span>
        <span class="footer-tagline">Protecting what matters most</span>
      </div>
    </div>

    <!-- Center: Links -->
    <div class="footer-links">
      <a class="footer-link" href="#">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="#">Terms of Use</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="#">Support</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="#">Contact</a>
    </div>

    <!-- Right: Status + copyright -->
    <div class="footer-right">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>All systems operational</span>
      </div>
      <span class="footer-copy">SmartSure {{ variant === 'admin' ? 'Admin' : '' }} v1.0 &nbsp;·&nbsp; &copy; {{ year }}</span>
    </div>

  </div>
</footer>
