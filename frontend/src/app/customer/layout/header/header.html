<header class="customer-header">
  <div class="header-inner">
    <!-- Brand -->
    <a routerLink="/customer/dashboard" class="brand" (click)="closeMenus()">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
          <path d="M12 7v5l4 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">Smart<span class="brand-accent">Sure</span></span>
    </a>

    <!-- Desktop Nav -->
    <nav class="desktop-nav">
      <a *ngFor="let link of navLinks" [routerLink]="link.route" routerLinkActive="active" class="nav-link">
        {{ link.label }}
      </a>
    </nav>

    <!-- Right Actions -->
    <div class="header-actions">

      <!-- Dark Mode Toggle -->
      <div class="theme-toggle" (click)="toggleTheme()" title="Toggle dark mode">
        <span class="toggle-icon">☀️</span>
        <div class="toggle-track" [class.active]="isDark">
          <div class="toggle-thumb" [class.active]="isDark"></div>
        </div>
        <span class="toggle-icon">🌙</span>
      </div>

      <div class="profile-wrap" (clickOutside)="showProfileMenu = false">
        <button class="profile-btn" (click)="toggleProfile()">
          <div class="avatar">{{ userName ? userName.charAt(0) : 'U' }}</div>
          <span class="user-name">{{ userName || 'Customer' }}</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <div class="profile-dropdown" *ngIf="showProfileMenu" (click)="$event.stopPropagation()">
          <a routerLink="/customer/account" class="dropdown-item" (click)="closeMenus()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Account Details
          </a>
          <a routerLink="/customer/my-policies" class="dropdown-item" (click)="closeMenus()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            My Policies
          </a>
          <a routerLink="/customer/my-claims" class="dropdown-item" (click)="closeMenus()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            My Claims
          </a>
          <a routerLink="/customer/premium-history" class="dropdown-item" (click)="closeMenus()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Premium History
          </a>
          <a routerLink="/customer/payment-history" class="dropdown-item" (click)="closeMenus()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><rect x="3" y="10" width="18" height="12" rx="2" ry="2"/><circle cx="16" cy="16" r="2"/></svg>
            Payment History
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>

      <!-- Mobile hamburger -->
      <button class="hamburger" (click)="toggleMobileNav()">
        <span [class.open]="mobileNavOpen"></span>
        <span [class.open]="mobileNavOpen"></span>
        <span [class.open]="mobileNavOpen"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Nav Drawer -->
  <nav class="mobile-nav" [class.open]="mobileNavOpen">
    <a *ngFor="let link of navLinks" [routerLink]="link.route" routerLinkActive="active" class="mobile-nav-link" (click)="closeMenus()">
      {{ link.label }}
    </a>
    <div class="mobile-divider"></div>
    <a routerLink="/customer/account" class="mobile-nav-link" (click)="closeMenus()">Account Details</a>
    <a routerLink="/customer/premium-history" class="mobile-nav-link" (click)="closeMenus()">Premium History</a>
    <a routerLink="/customer/payment-history" class="mobile-nav-link" (click)="closeMenus()">Payment History</a>
    <div class="mobile-theme-row">
      <span class="mobile-theme-label">Dark Mode</span>
      <div class="theme-toggle" (click)="toggleTheme()">
        <div class="toggle-track" [class.active]="isDark">
          <div class="toggle-thumb" [class.active]="isDark"></div>
        </div>
      </div>
    </div>
    <button class="mobile-nav-link logout-link" (click)="logout()">Sign Out</button>
  </nav>
</header>

<div class="header-overlay" *ngIf="showProfileMenu" (click)="closeMenus()"></div>
