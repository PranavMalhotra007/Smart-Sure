<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 1 10 0A5 5 0 0 1 3 8Z" fill="white" fill-opacity="0.3"/><path d="M8 4v4l3 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text">Smart<span>Sure</span></span>
    </div>

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your admin dashboard</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" formControlName="email" placeholder="admin@smartsure.com" autofocus>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          <button type="button" class="btn-icon" (click)="togglePassword()">
             <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
             <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="actions">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe">
          <span class="checkmark"></span>
          Remember Me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <svg *ngIf="isLoading" class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </button>

      <div class="register-link-container" style="text-align: center; margin-top: 20px; font-size: 14px; color: #a1a1aa;">
        Don't have an account? <a href="#" routerLink="/register" style="color: #6ee7b7; text-decoration: none; font-weight: 500;">Register Now</a>
      </div>
    </form>
  </div>
</div>
