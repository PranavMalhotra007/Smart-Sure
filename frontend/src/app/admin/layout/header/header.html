<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 1 10 0A5 5 0 0 1 3 8Z" fill="white" fill-opacity="0.3"/><path d="M8 4v4l3 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <span class="logo-text">Smart<span>Sure</span></span>
    <div class="hd"></div>
    <div class="breadcrumb">
      <span>Admin</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="cur">{{ title }}</span>
    </div>
  </div>

  <div class="header-right">
    <button class="hbtn" title="Search">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14" stroke-linecap="round"/></svg>
    </button>
    <button class="hbtn" title="Notifications" style="position:relative">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 2a4 4 0 0 1 4 4v3l1 1.5H3L4 9V6a4 4 0 0 1 4-4Z"/><path d="M6.5 13a1.5 1.5 0 0 0 3 0"/></svg>
      <span class="ndot"></span>
    </button>

    <!-- Dark Mode Toggle -->
    <div class="theme-toggle" (click)="toggleTheme()" title="Toggle dark mode">
      <span class="toggle-icon">☀️</span>
      <div class="toggle-track" [class.active]="isDark">
        <div class="toggle-thumb" [class.active]="isDark"></div>
      </div>
      <span class="toggle-icon">🌙</span>
    </div>

    <div class="hav" [class.open]="isHavOpen" (click)="toggleHav($event)">
      <div class="av-circle">AD</div>
      <span class="hav-name">Admin</span>
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3l3 3 3-3" stroke-linecap="round"/></svg>

      <!-- Dropdown -->
      <div class="dropdown-menu" *ngIf="isHavOpen" (click)="$event.stopPropagation()">
        <div class="dd-item" (click)="logout()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 3h3v10h-3M7 11l4-4-4-4M11 8H3"/></svg>
          Sign out
        </div>
      </div>
    </div>
  </div>
</header>
