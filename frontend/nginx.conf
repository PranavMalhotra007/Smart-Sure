server {
    listen 4200;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Angular SPA routing ──────────────────────────────────────────────────
    # All non-asset requests fall back to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the API Gateway ──────────────────────────────────
    # The browser hits http://localhost:4200/api/* and Nginx forwards them
    # to the api-gateway container on the internal Docker network.
    location /api/ {
        proxy_pass         http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Same proxy for /user/** endpoints used by the auth service
    location /user/ {
        proxy_pass         http://api-gateway:8080/user/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Cache static assets ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
