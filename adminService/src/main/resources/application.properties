spring.application.name=adminService
server.port=8084

# ===================================================================
# EUREKA SERVICE DISCOVERY CONFIGURATION
# ===================================================================
eureka.client.serviceUrl.defaultZone=http://service-registry-smart-sure:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ===================================================================
# DATABASE CONFIGURATION - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:mysql://mysql:3306/database
spring.datasource.username=root
spring.datasource.password=Arcana
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================================================
# JWT SECURITY CONFIGURATION
# ===================================================================
jwt.secret=767BI36HSIUNYD7352198N1SV12BS62428748NDH7878BXB7B65D326B67SBVV6VS62545265776XBHG
jwt.expiration=86400000
internal.secret=JHGUY72638DEGWRT7D4365N89SOQL89234Y3IUTBR7DT4NQ3479387DNBYFGR366746823BETYX


# ===================================================================
# DISTRIBUTED CACHING - REDIS CONFIGURATION
# ===================================================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.cache.type=redis
spring.cache.redis.time-to-live=180000
spring.cache.redis.cache-null-values=false

# ===================================================================
# RABBITMQ MESSAGING CONFIGURATION
# ===================================================================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms

# ===================================================================
# DISTRIBUTED TRACING CONFIGURATION
# ===================================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
management.tracing.enabled=true
# ===================================================================
# ACTUATOR ENDPOINTS CONFIGURATION
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.com.smartSure.adminService=INFO
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.amqp=DEBUG