# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ===============================
# CORS
# ===============================
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# ===============================
# EMAIL (Gmail )
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
notification.from-email=noreply@smartsure.com

# ===============================
# ASYNC THREAD POOL (for email)
# ===============================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# Don't let mail failure bring the whole health check DOWN
management.health.mail.enabled=false

# Don't let redis failure bring health DOWN while testing without Redis
management.health.redis.enabled=false


# ===============================
# RESILIENCE4J ? CIRCUIT BREAKERS
# ===============================

# ?? AuthService Circuit Breaker ????????????????????????????????????????
# Used when calling AuthService via Feign to get customer profile/email
resilience4j.circuitbreaker.instances.authService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.authService.permitted-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.authService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.authService.register-health-indicator=true

# ?? NotificationService Circuit Breaker ????????????????????????????????
# Used when sending emails via Gmail SMTP ? prevents email failures
# from blocking policy purchase / payment operations
resilience4j.circuitbreaker.instances.notificationService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.notificationService.permitted-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.notificationService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.notificationService.register-health-indicator=true

# ?? PolicyTypeService Circuit Breaker ??????????????????????????????????
# Protects DB queries for policy type lookups (used in every purchase)
resilience4j.circuitbreaker.instances.policyTypeService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.policyTypeService.sliding-window-size=10
resilience4j.circuitbreaker.instances.policyTypeService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.policyTypeService.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.policyTypeService.permitted-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.policyTypeService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.policyTypeService.register-health-indicator=true

# ===============================
# RESILIENCE4J ? RETRY
# ===============================

# Retry for AuthService ? try 3 times before giving up
resilience4j.retry.instances.authService.max-attempts=3
resilience4j.retry.instances.authService.wait-duration=1s
resilience4j.retry.instances.authService.enable-exponential-backoff=true
resilience4j.retry.instances.authService.exponential-backoff-multiplier=2
resilience4j.retry.instances.authService.retry-exceptions=java.io.IOException,feign.FeignException

# Retry for notifications ? 2 attempts, 2 second wait
resilience4j.retry.instances.notificationService.max-attempts=2
resilience4j.retry.instances.notificationService.wait-duration=2s
resilience4j.retry.instances.notificationService.retry-exceptions=org.springframework.mail.MailException

# ===============================
# RESILIENCE4J ? RATE LIMITER
# ===============================

# Limit purchase API ? max 10 policy purchases per second per instance
resilience4j.ratelimiter.instances.policyPurchase.limit-for-period=10
resilience4j.ratelimiter.instances.policyPurchase.limit-refresh-period=1s
resilience4j.ratelimiter.instances.policyPurchase.timeout-duration=0s
resilience4j.ratelimiter.instances.policyPurchase.register-health-indicator=true

# ===============================
# RESILIENCE4J ? ACTUATOR EXPOSURE
# ===============================
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents

# ===============================
# SERVICE URLS (for Feign clients)
# ===============================
services.auth-service.url=http://localhost:8081

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# How many times to retry a failed message before sending to dead letter queue
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.acknowledge-mode=auto
